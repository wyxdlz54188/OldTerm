name: Build NewTerm iOS 6

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build NewTerm (iOS 6.0)
    runs-on: macos-12
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Theos dependencies
      run: |
        brew install make dpkg libffi

    - name: Setup Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        
    - name: Download iOS SDK
      run: |
        mkdir -p $THEOS/sdks
        curl -L "https://github.com/theos/sdks/releases/download/15.0/iPhoneOS15.0.sdk.tar.gz" -o /tmp/sdk.tar.gz
        tar -xzf /tmp/sdk.tar.gz -C $THEOS/sdks
        rm /tmp/sdk.tar.gz
        ls -la $THEOS/sdks/

    - name: Build NewTerm
      run: |
        export THEOS_PROJECT_DIR=$PWD
        export PATH="$HOME/theos/bin:$PATH"
        which gmake
        gmake package FINALVERSION=1.0.0 IPHONEOS_DEPLOYMENT_TARGET=15.0
        ls -la packages/

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: newterm-ios6
        path: packages/*.deb
